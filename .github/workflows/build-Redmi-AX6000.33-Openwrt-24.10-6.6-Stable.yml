name: OpenWrt Redmi AX6000-33-24.10-6.6-Stable

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  # schedule:
    # - cron: 0 5 * * 5

permissions:
  contents: write
  actions: write
  discussions: write
  pages: write
  id-token: write

env:
  REPO_URL: https://github.com/NicolasMe9907/immortalwrt-mt798x-6.6.git
  REPO_BRANCH: openwrt-24.10-6.6
  DEVICE_NAME: Redmi AX6000
  FILES: immortalwrt/files
  FEEDS_CONF: immortalwrt/feeds.conf.default
  CONFIG_FILE: immortalwrt/config.Redmi_AX6000-Padavanonly.24.10-6.6.bak
  DIY_P1_SH: immortalwrt/diy-part1-baili.sh
  DIY_P2_SH: immortalwrt/diy-part2-redmi33.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: 准备完成
      uses: actions/checkout@v4

    - name: 检查服务器配置
      run: |
        echo "若分配的服务器性能不足，务必及时取消，重新运行！"
        echo -e "------------------------------- CPU信息 -------------------------------\n"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo -e "------------------------------- 内存信息 -------------------------------\n"
        echo "已安装内存详细信息: "
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo -e "------------------------------- 磁盘信息 -------------------------------\n"
        echo -e "磁盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "------------------------------- 磁盘详情 -------------------------------\n"
        df -Th

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 4096
        temp-reserve-mb: 1024
        root-reserve-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Checkout
      uses: actions/checkout@v4

    - name: 安装 Go Stable
      uses: actions/setup-go@main
      with:
        go-version: 'stable'
        cache: false

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        docker rmi $(docker images -q) 2>/dev/null || true
        sudo -E apt-get -qq update -y
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: 加载自定义 feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Precise Download SmartCore (AI-Driven) for MT798x
      run: |
       # ==================== 路径与变量配置 ====================
       # 使用 OpenClash 官方仓库的 SmartCore (ARM64)
       SMARTCORE_URL="https://raw.githubusercontent.com/vernesong/OpenClash/core/master/smart/clash-linux-arm64.tar.gz"

       # 编译机或实机路径
       ROOT_DIR=$(pwd)
       OC_CORE_DIR="$ROOT_DIR/openwrt/files/etc/openclash/core"
       NIKKI_CORE_PATH="$ROOT_DIR/openwrt/files/usr/bin/mihomo" # 编译时路径
       # 如果是在实机运行，请取消下面两行的注释：
       # OC_CORE_DIR="/etc/openclash/core"
       # NIKKI_CORE_PATH="/usr/bin/mihomo"

       TMP_DIR="/tmp/smartcore_update"
       # ========================================================

       echo "🎯 开始 SmartCore 全量注入流程 (OpenClash + Nikki)..."

       # 1. 准备环境
       mkdir -p "$TMP_DIR"
       mkdir -p "$OC_CORE_DIR"
       mkdir -p "$(dirname "$NIKKI_CORE_PATH")"

       # 2. 下载指定的 SmartCore
       echo "📥 正在从 OpenClash 仓库抓取 SmartCore..."
       wget -O "$TMP_DIR/smartcore.tar.gz" --no-check-certificate "$SMARTCORE_URL" || {
       echo "❌ 下载失败"; exit 1;
       }

       # 3. 解压并精准提取
       echo "📦 解压内核文件..."
       tar -zxvf "$TMP_DIR/smartcore.tar.gz" -C "$TMP_DIR/" || {
       echo "❌ 解压失败"; exit 1;
       }

       # 寻找解压出来的二进制文件 (通常叫 clash)
       SOURCE_BINARY=$(find "$TMP_DIR" -type f -name "clash*" | head -n 1)

       if [ -z "$SOURCE_BINARY" ]; then
       echo "❌ 未找到解压后的二进制内核"; exit 1;
       fi

       # 4. 物理主权分发：一源多用
       echo "🛡️ 正在注入 OpenClash (重命名为 clash_meta)..."
       cp -f "$SOURCE_BINARY" "$OC_CORE_DIR/clash_meta"
       chmod +x "$OC_CORE_DIR/clash_meta"

       echo "🛡️ 正在注入 Nikki (替换为 mihomo)..."
       cp -f "$SOURCE_BINARY" "$NIKKI_CORE_PATH"
       chmod +x "$NIKKI_CORE_PATH"

       # 5. 架构验证 (RAX3000M 必须是 aarch64)
       echo "🧪 执行物理架构交叉验证..."
       FILE_INFO=$(file "$NIKKI_CORE_PATH")
       if echo "$FILE_INFO" | grep -q "aarch64"; then
       echo "✅ 验证通过: 成功获取 ARM64 架构 SmartCore"
       else
       echo "❌ 警告: 检测到非 ARM64 架构，请检查下载链接"; exit 1
       fi

       # 6. 预置缓存空间 (为 AI 模块预留)
       mkdir -p "$ROOT_DIR/openwrt/files/etc/openclash/cache"

       # 7. 清理
       rm -rf "$TMP_DIR"

       echo "🎉 [双路合闸] SmartCore 已成功注入 OpenClash 与 Nikki。"
       echo "🚀 物理主权已确立，准备进入编译或重启服务。"

    - name: 更新 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        # 针对 Rust 编译失败的补丁，尝试拉取最新的 Makefile
       
    - name: 安装 feeds
      run: |
        cd openwrt
        # 彻底清理并替换旧版 OpenClash (解决有芯无壳)
        find ./ -name "luci-app-openclash" -type d -exec rm -rf {} +
        git clone --depth 1 -b master https://github.com/vernesong/OpenClash.git package/luci-app-openclash
        # 替换 Golang 版本避免编译冲突
        rm -rf feeds/packages/lang/golang
        git clone https://github.com/sbwml/packages_lang_golang.git feeds/packages/lang/golang
        ./scripts/feeds install -a
        ./scripts/feeds uninstall {mmdvm,mmdvm-host,p25-clients,ysf-clients,nxdn-clients,mmdvm-luci,dapnet-gateway,ircddb-gateway,libmmdvm,libwxwidgets,mmdvm-cal}

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 缓存编译环境
      uses: actions/cache@v4
      with:
        path: |
          openwrt/staging_dir/host
          openwrt/staging_dir/tool
          openwrt/.ccache
        key: ${{ runner.os }}-openwrt-24.10-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-24.10-${{ env.REPO_BRANCH }}-
          ${{ runner.os }}-openwrt-24.10-

    - name: Setup tmate session
      uses: mxschmitt/action-tmate@master
      if: github.event.inputs.ssh == 'true'
      with:
        limit-access-to-actor: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 检查磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin/targets/*/*

    - name: 生成发布标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H.%M")" >> ${GITHUB_OUTPUT}
        touch release.txt
        echo "
        💻 路由: P&W RAX3000Me Padavanonly
        📂 源码: ${{ env.REPO_URL }}
        🌳 分支: ${{ env.REPO_BRANCH }}
        ⏱️ 编译时间: $(date +"%Y年%m月%d日%H时%M分")
        🌐 管理地址: 192.168.10.1
        👤 用户名: root
        🔒 密码: 无密码
        " >> release.txt
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 自动发布固件到 Releases
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: openwrt/bin/targets/*/*/*
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 删除运行记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 7
        keep_minimum_runs: 7
        token: ${{ secrets.GITHUB_TOKEN }}
